{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm p-4 bg-white mt-4">
    <h2>Оставить рецензию на книгу: {{ book.title }}</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Оценка (от 1 до 5):</label>
            <input type="number" name="rating" class="form-control" min="1" max="5" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ваша рецензия:</label>
            <textarea name="text" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Отправить рецензию</button>
        <a href="{{ url_for('view_book', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
