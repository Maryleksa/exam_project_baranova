{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Мои подборки</h2>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newCollectionModal">Добавить подборку</button>
</div>

<table class="table table-striped table-hover bg-white shadow-sm rounded">
    <thead>
        <tr>
            <th>Название подборки</th>
            <th>Количество книг</th>
            <th>Действие</th>
        </tr>
    </thead>
    <tbody>
        {% for col in collections %}
        <tr>
            <td>{{ col.name }}</td>
            <td>{{ col.books|length }}</td>
            <td>
                <a href="{{ url_for('view_collection', collection_id=col.id) }}" class="btn btn-primary btn-sm">Просмотр</a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3" class="text-center text-muted">У вас пока нет созданных подборок.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="modal fade" id="newCollectionModal" tabindex="-1">
    <div class="modal-dialog modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Новая подборка</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form action="{{ url_for('add_collection') }}" method="POST">
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Название подборки</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success">Добавить</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
